# Test configuration for Yul-to-Venom validation
# Single source of truth for test metadata and execution cases

tests:
  - id: basic_math
    file: BasicMath.sol
    description: "Test basic math without strings"
    tags: [math, simple, basic]
    execution_tests:
      - name: set_value_123
        function: "setValue(uint256)"
        args: [123]
        expected_storage: {0: 123}
      - name: get_value_after_set
        function: "getValue()"
        expected_return_int: 123
      - name: add_10_20
        function: "add(uint256,uint256)"
        args: [10, 20]
        expected_return_int: 30
      - name: multiply_6_7
        function: "multiply(uint256,uint256)"
        args: [6, 7]
        expected_return_int: 42

  - id: AdvancedFeatures
    file: AdvancedFeatures.sol
    description: "Test advanced storage + control flow"
    tags: [storage, loops, advanced]
    execution_tests:
      - name: deposit_amount_5
        function: "deposit(uint256)"
        args: [5]
      - name: deposit_amount_7
        function: "deposit(uint256)"
        args: [7]
      - name: get_user_after_deposits
        function: "getUser(address)"
        args_types: [address]
        args: ["0x2000000000000000000000000000000000000002"]
        expected_return_abi:
          types: [uint256, uint256]
          values: [12, 2]
      - name: history_sum_after_deposits
        function: "historySum()"
        expected_return_abi:
          types: [uint256]
          values: [12]
      - name: history_average_after_deposits
        function: "historyAverage()"
        expected_return_abi:
          types: [uint256]
          values: [6]
      - name: withdraw_amount_4
        function: "withdraw(uint256)"
        args: [4]
      - name: get_user_after_withdraw
        function: "getUser(address)"
        args_types: [address]
        args: ["0x2000000000000000000000000000000000000002"]
        expected_return_abi:
          types: [uint256, uint256]
          values: [8, 3]
      - name: history_sum_after_withdraw
        function: "historySum()"
        expected_return_abi:
          types: [uint256]
          values: [12]
      - name: factorial_six
        function: "factorial(uint256)"
        args: [6]
        expected_return_abi:
          types: [uint256]
          values: [720]
      - name: factorial_ten
        function: "factorial(uint256)"
        args: [10]
        expected_return_abi:
          types: [uint256]
          values: [3628800]
      - name: factorial_zero
        function: "factorial(uint256)"
        args: [0]
        expected_return_abi:
          types: [uint256]
          values: [1]
      - name: fib_seven
        function: "fib(uint256)"
        args: [7]
        expected_return_abi:
          types: [uint256]
          values: [13]
      - name: fib_twenty
        function: "fib(uint256)"
        args: [20]
        expected_return_abi:
          types: [uint256]
          values: [6765]
      - name: fib_zero
        function: "fib(uint256)"
        args: [0]
        expected_return_abi:
          types: [uint256]
          values: [0]

  - id: HeavyMath
    file: HeavyMath.sol
    description: "Stress gas usage with heavy math"
    tags: [math, gas, heavy]
    execution_tests:
      - name: sum_of_squares_50
        function: "sumOfSquares(uint256)"
        args: [50]
      - name: sum_of_squares_350
        function: "sumOfSquares(uint256)"
        args: [350]
        expected_return_int: 14352975
      - name: sum_of_squares_1000
        function: "sumOfSquares(uint256)"
        args: [1000]
      - name: factorial_mod_10
        function: "factorialMod(uint256)"
        args: [10]
      - name: factorial_mod_45
        function: "factorialMod(uint256)"
        args: [45]
        expected_return_int: 472639410
      - name: factorial_mod_100
        function: "factorialMod(uint256)"
        args: [100]
      - name: fibonacci_20
        function: "fibonacci(uint256)"
        args: [20]
        expected_return_int: 6765
      - name: fibonacci_75
        function: "fibonacci(uint256)"
        args: [75]
        expected_return_int: 2111485077978050
      - name: fibonacci_150
        function: "fibonacci(uint256)"
        args: [150]
      - name: polynomial_reduce_small
        function: "polynomialReduce(uint256)"
        args: [42]
      - name: polynomial_reduce
        function: "polynomialReduce(uint256)"
        args: [987654321]
        expected_return_int: 604495212
      - name: mixed_series_light
        function: "mixedSeries(uint256,uint256)"
        args: [5, 5]
      - name: mixed_series_heavy
        function: "mixedSeries(uint256,uint256)"
        args: [17, 12]
        expected_return_int: 862282241
      - name: mixed_series_heavier
        function: "mixedSeries(uint256,uint256)"
        args: [42, 20]

  - id: simple_storage
    file: SimpleStorage.sol
    description: "Test basic storage operations"
    tags: [storage, events, basic]
    # Maps to "SimpleStorage" in TEST_CASES
    test_case_key: SimpleStorage
    execution_tests:
      - name: store_42
        function: "store(uint256)"
        args: [42]
        expected_storage: {0: 42}
      - name: retrieve_after_store
        function: "retrieve()"
        expected_return_int: 42
      - name: store_0
        function: "store(uint256)"
        args: [0]
        expected_storage: {0: 0}
      - name: store_max_uint256
        function: "store(uint256)"
        args: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff]
        expected_storage: {0: 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff}

  - id: arithmetic
    file: Arithmetic.sol
    description: "Test arithmetic operations"
    tags: [arithmetic, pure, basic]
    execution_tests:
      - name: add_5_3
        function: "add(uint256,uint256)"
        args: [5, 3]
        expected_return_int: 8
      - name: add_large
        function: "add(uint256,uint256)"
        args: [999999999999, 1]
        expected_return_int: 1000000000000
      - name: subtract_10_3
        function: "subtract(uint256,uint256)"
        args: [10, 3]
        expected_return_int: 7
      - name: subtract_overflow_reverts
        function: "subtract(uint256,uint256)"
        args: [3, 10]
        expected_revert: true
      - name: multiply_4_7
        function: "multiply(uint256,uint256)"
        args: [4, 7]
        expected_return_int: 28
      - name: multiply_large
        function: "multiply(uint256,uint256)"
        args: [123456789, 987654321]
        expected_return_int: 121932631112635269
      - name: divide_100_7
        function: "divide(uint256,uint256)"
        args: [100, 7]
        expected_return_int: 14
      - name: divide_by_zero_reverts
        function: "divide(uint256,uint256)"
        args: [100, 0]
        expected_revert: true
      - name: modulo_100_7
        function: "modulo(uint256,uint256)"
        args: [100, 7]
        expected_return_int: 2
      - name: modulo_by_zero_reverts
        function: "modulo(uint256,uint256)"
        args: [100, 0]
        expected_revert: true
      - name: power_2_10
        function: "power(uint256,uint256)"
        args: [2, 10]
        expected_return_int: 1024
      - name: power_3_7
        function: "power(uint256,uint256)"
        args: [3, 7]
        expected_return_int: 2187
      - name: power_base_0
        function: "power(uint256,uint256)"
        args: [0, 5]
        expected_return_int: 0
      - name: power_exp_0
        function: "power(uint256,uint256)"
        args: [999, 0]
        expected_return_int: 1
      - name: maximum_5_10
        function: "maximum(uint256,uint256)"
        args: [5, 10]
        expected_return_int: 10
      - name: maximum_equal
        function: "maximum(uint256,uint256)"
        args: [42, 42]
        expected_return_int: 42
      - name: minimum_5_10
        function: "minimum(uint256,uint256)"
        args: [5, 10]
        expected_return_int: 5

  - id: control_flow
    file: ControlFlow.sol
    description: "Test control flow structures"
    tags: [control, loops, conditions]
    test_case_key: ControlFlow
    execution_tests:
      - name: for_loop_sum_5
        function: "forLoopSum(uint256)"
        args: [5]
        expected_return_int: 15
      - name: for_loop_sum_100
        function: "forLoopSum(uint256)"
        args: [100]
        expected_return_int: 5050
      - name: for_loop_sum_500
        function: "forLoopSum(uint256)"
        args: [500]
        expected_return_int: 125250
      - name: while_factorial_5
        function: "whileLoopFactorial(uint256)"
        args: [5]
        expected_return_int: 120
      - name: while_factorial_10
        function: "whileLoopFactorial(uint256)"
        args: [10]
        expected_return_int: 3628800
      - name: while_factorial_0
        function: "whileLoopFactorial(uint256)"
        args: [0]
        expected_return_int: 1
      - name: require_test_valid
        function: "requireTest(uint256)"
        args: [10]
        expected_return_int: 20
      - name: require_test_zero_reverts
        function: "requireTest(uint256)"
        args: [0]
        expected_revert: true
      - name: require_test_large_reverts
        function: "requireTest(uint256)"
        args: [5000]
        expected_revert: true
      - name: nested_loops_3
        function: "nestedLoops(uint256)"
        args: [3]
        expected_return_int: 9
      - name: nested_loops_10
        function: "nestedLoops(uint256)"
        args: [10]
        expected_return_int: 100
      - name: nested_loops_20
        function: "nestedLoops(uint256)"
        args: [20]
        expected_return_int: 400
      - name: assert_test_10
        function: "assertTest(uint256)"
        args: [10]
        expected_return_int: 20
      - name: assert_test_500
        function: "assertTest(uint256)"
        args: [500]
        expected_return_int: 1000

  - id: immutable_simple
    file: ImmutableSimple.sol
    description: "Test immutable variable handling"
    tags: [immutable, constructor, basic]
    execution_tests:
      - name: read_stored_immutable
        function: "readStored()"
        expected_return_int: 7

  - id: simple_library_use
    file: SimpleLibraryUse.sol
    description: "Test library linking and delegation"
    tags: [library, linking, pure]
    execution_tests:
      - name: double_5
        function: "double(uint256)"
        args: [5]
        expected_return_int: 10
      - name: double_0
        function: "double(uint256)"
        args: [0]
        expected_return_int: 0
      - name: double_100
        function: "double(uint256)"
        args: [100]
        expected_return_int: 200

  - id: minimal
    file: Minimal.sol
    description: "Test minimal contract with public state variable"
    tags: [minimal, getter, basic]
    execution_tests:
      - name: get_x_initial
        function: "x()"
        expected_return_int: 42

  - id: Math512WithDeps
    file: Math512WithDeps.sol
    description: "512-bit math library with harness contract"
    tags: [math, 512bit, library, gas]
    execution_tests:
      # --- addUint256: 256-bit addition returning 512-bit result ---
      - name: add256_small
        function: "addUint256(uint256,uint256)"
        args: [3, 5]
        expected_return_abi:
          types: [uint256, uint256]
          values: [0, 8]
      - name: add256_overflow
        function: "addUint256(uint256,uint256)"
        args: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 1]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0]
      - name: add256_max_max
        function: "addUint256(uint256,uint256)"
        args: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0xfffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffe]
      # --- addUint512: full 512-bit addition ---
      - name: add512_simple
        function: "addUint512(uint256,uint256,uint256,uint256)"
        args: [1, 0, 0, 5]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 5]
      - name: add512_lo_carry
        function: "addUint512(uint256,uint256,uint256,uint256)"
        args: [0, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 0, 1]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0]
      # --- addUint512Scalar: 512-bit + 256-bit scalar ---
      - name: add512scalar_simple
        function: "addUint512Scalar(uint256,uint256,uint256)"
        args: [0, 100, 50]
        expected_return_abi:
          types: [uint256, uint256]
          values: [0, 150]
      - name: add512scalar_carry
        function: "addUint512Scalar(uint256,uint256,uint256)"
        args: [0, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 1]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0]
      # --- mulUint256: 256x256 -> 512-bit result ---
      - name: mul256_small
        function: "mulUint256(uint256,uint256)"
        args: [7, 13]
        expected_return_abi:
          types: [uint256, uint256]
          values: [0, 91]
      - name: mul256_large
        function: "mulUint256(uint256,uint256)"
        args: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 2]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0xfffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffe]
      - name: mul256_squared_2pow128
        function: "mulUint256(uint256,uint256)"
        args: [340282366920938463463374607431768211456, 340282366920938463463374607431768211456]
        expected_return_abi:
          types: [uint256, uint256]
          values: [1, 0]
      # --- gtUint512: 512-bit comparison ---
      - name: gt512_true
        function: "gtUint512(uint256,uint256,uint256,uint256)"
        args: [1, 0, 0, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff]
        expected_return_abi:
          types: [bool]
          values: [true]
      - name: gt512_false
        function: "gtUint512(uint256,uint256,uint256,uint256)"
        args: [0, 5, 0, 10]
        expected_return_abi:
          types: [bool]
          values: [false]
      - name: gt512_equal
        function: "gtUint512(uint256,uint256,uint256,uint256)"
        args: [1, 42, 1, 42]
        expected_return_abi:
          types: [bool]
          values: [false]
      # --- compareToScalar: 512-bit vs 256-bit comparison ---
      - name: compare_equal
        function: "compareToScalar(uint256,uint256,uint256)"
        args: [0, 42, 42]
        expected_return_abi:
          types: [bool, bool]
          values: [false, true]
      - name: compare_greater
        function: "compareToScalar(uint256,uint256,uint256)"
        args: [0, 100, 50]
        expected_return_abi:
          types: [bool, bool]
          values: [true, false]
      - name: compare_less
        function: "compareToScalar(uint256,uint256,uint256)"
        args: [0, 10, 50]
        expected_return_abi:
          types: [bool, bool]
          values: [false, false]
      - name: compare_hi_nonzero
        function: "compareToScalar(uint256,uint256,uint256)"
        args: [1, 0, 5]
        expected_return_abi:
          types: [bool, bool]
          values: [true, false]
      # --- modUint512: 512-bit modulo ---
      - name: mod512_simple
        function: "modUint512(uint256,uint256,uint256)"
        args: [0, 100, 7]
        expected_return_int: 2
      - name: mod512_large
        function: "modUint512(uint256,uint256,uint256)"
        args: [1, 0, 3]
        expected_return_int: 1
      - name: mod512_prime
        function: "modUint512(uint256,uint256,uint256)"
        args: [0, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 1000000007]
        expected_return_int: 792845265
      # --- roundTripExternal: serialize/deserialize ---
      - name: roundtrip_values
        function: "roundTripExternal(uint256,uint256)"
        args: [42, 99]
        expected_return_abi:
          types: [uint256, uint256]
          values: [42, 99]
      - name: roundtrip_zeros
        function: "roundTripExternal(uint256,uint256)"
        args: [0, 0]
        expected_return_abi:
          types: [uint256, uint256]
          values: [0, 0]
      - name: roundtrip_max
        function: "roundTripExternal(uint256,uint256)"
        args: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff]
        expected_return_abi:
          types: [uint256, uint256]
          values: [0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff, 0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff]

  - id: mainnetflat
    file: MainnetFlat.sol
    description: "Test MainnetSettler from 0x Settler"
    tags: [mainnet, fork, complex]
    fork_chain_id: 1  # Fork Ethereum mainnet state (DAI, USDC, LitePSM, etc.)
    local_chain_id: 31337  # Bypass SettlerBase NFT ownership check
    code_size_limit: 100000  # Override EIP-170 24KB limit (runtime is 43KB)
    skip_reason: >
      Transpiled bytecode fails with Panic(0x01) during constructor execution.
      Original solc bytecode deploys successfully, but Yul-to-Venom transpiled
      version triggers an assertion failure. Requires investigation into
      transpilation differences.

# Default test cases for contracts without specific tests
default_tests:
  - name: empty_call
    calldata: ""
    expected_revert: true
  - name: invalid_selector
    calldata: "deadbeef"
    expected_revert: true

# Default caller address for tests
default_caller: "0x2000000000000000000000000000000000000002"

# Library-only files (no deployable contract, used as dependencies)
# These are excluded from test discovery - their code is tested via
# contracts that import them (e.g., Math512WithDeps tests 512Math code)
exclude_files:
  - 512Math.sol      # Library-only, tested via Math512WithDeps
  - UnsafeMath.sol   # Library-only, tested via Math512WithDeps
  - Panic.sol        # Library-only, tested via Math512WithDeps
